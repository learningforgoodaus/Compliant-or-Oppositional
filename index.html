<style>
    /* Updated Mobile Labels to be dark and bold */
    .swipe-instructions {
        display: none;
        width: 100%;
        justify-content: space-between;
        padding: 15px 10px;
        font-size: 0.9rem;
        font-weight: 800; /* Extra bold */
        color: #413659;   /* Dark Brand Purple */
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    /* Pale feedback colors */
    .bg-pale-green { background-color: #d1fae5 !important; } /* Tailwind green-100 */
    .bg-pale-red { background-color: #fee2e2 !important; }   /* Tailwind red-100 */

    /* ... rest of your existing desktop styles ... */
</style>

<div class="swipe-instructions">
    <span>← SWIPE OPPOSITIONAL</span>
    <span>COMPLIANT SWIPE →</span>
</div>

<script>
    /* ... existing shuffle and data ... */

    function touchMove(e) {
        if (!currentCard) return;
        const currentX = e.touches[0].clientX;
        const diff = currentX - startX;
        const rotation = diff / 12;
        const category = currentCard.dataset.category;

        // Visual feedback logic
        currentCard.classList.remove('bg-pale-green', 'bg-pale-red');
        
        if (diff > 50) { // Swiping Right
            category === "Compliant" ? 
                currentCard.classList.add('bg-pale-green') : 
                currentCard.classList.add('bg-pale-red');
        } else if (diff < -50) { // Swiping Left
            category === "Oppositional" ? 
                currentCard.classList.add('bg-pale-green') : 
                currentCard.classList.add('bg-pale-red');
        }

        currentCard.style.transform = `translateX(${diff}px) rotate(${rotation}deg)`;
    }

    function touchEnd(e) {
        if (!currentCard) return;
        const diff = e.changedTouches[0].clientX - startX;
        const threshold = 120;
        const category = currentCard.dataset.category;

        const isCorrectSide = (diff > threshold && category === "Compliant") || 
                            (diff < -threshold && category === "Oppositional");

        if (isCorrectSide) {
            // Correct side - Complete swipe
            currentCard.style.transition = 'transform 0.4s ease-out, opacity 0.3s';
            currentCard.style.transform = `translateX(${diff > 0 ? 1000 : -1000}px) rotate(${diff / 5}deg)`;
            currentCard.style.opacity = '0';
            setTimeout(() => {
                currentCard.remove();
                if (mobileZone.children.length === 0) {
                    feedbackDiv.innerHTML = `<span class="text-green-600">Great job! All signs categorized.</span>`;
                }
            }, 400);
        } else {
            // Snap back if it's the wrong side OR swipe wasn't far enough
            currentCard.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s';
            currentCard.style.transform = 'translateX(0) rotate(0)';
            currentCard.classList.remove('bg-pale-green', 'bg-pale-red');
        }
        currentCard = null;
    }
</script>
