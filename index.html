<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Power and Control Wheel Activity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F6F5F8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .main-header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 0 1rem 0;
            text-align: center;
            font-size: 1.875rem;
            font-weight: 700;
            color: #413659;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        /* PC CONTAINER - Fixed 800px */
        .learning-activity-container {
            position: relative;
            width: 800px;
            height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 60px;
        }

        .large-circle {
            width: 400px;
            height: 400px;
            background-color: #C6B4D9;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.5s ease-in-out;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #413659;
            line-height: 1.6;
            box-sizing: border-box;
            border: 5px solid #9C7F9D;
            z-index: 10;
        }

        .large-circle-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .large-circle-content h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; }
        .large-circle-content p { font-size: 1.05rem; font-weight: 500; margin: 0; }

        .small-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #513873;
            color: #F6F5F8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            transition: transform 0.7s ease-in-out, background-color 0.3s, color 0.3s;
            z-index: 20;
            box-sizing: border-box;
        }

        .small-circle.active {
            background-color: #C6B4D9;
            color: #513873;
            border: 4px solid #413659;
        }

        /* MOBILE OVERRIDES */
        @media (max-width: 768px) {
            body { align-items: flex-start; padding-top: 100px; overflow-y: auto; }
            .main-header { font-size: 1.2rem; }
            
            .learning-activity-container {
                width: 100vw;
                height: 150vw;
                margin-top: 20px;
            }

            .large-circle {
                width: 80vw;
                height: 80vw;
                padding: 20px;
            }

            .large-circle-content h2 { font-size: 1rem; margin-bottom: 8px; }
            .large-circle-content p { font-size: 0.8rem; line-height: 1.4; padding: 0 5px; }

            .circle-title { display: none; }
            .circle-number { font-size: 1.5rem !important; font-weight: 700; }

            .small-circle {
                width: 15vw;
                height: 15vw;
                transition: background-color 0.3s;
            }

            .small-circle.active {
                transform: none !important;
                background-color: #C6B4D9;
                color: #513873;
            }
        }
    </style>
</head>
<body>
    <header class="main-header">Tactics used to gain power and control</header>

    <div class="learning-activity-container">
        <div id="large-circle" class="large-circle">
            <div class="large-circle-content">
                <h2 id="large-circle-title"></h2>
                <p id="large-circle-text"></p>
            </div>
        </div>
        <div id="small-circles-wrapper"></div>
    </div>

    <script>
        const sectionsData = [
            { id: 'coercion', title: 'Using Coercion & Threats', content: 'Making and/or carrying out threats to hurt them, threatening to leave them, to commit suicide, or to report them to welfare, forcing them to drop charges, or making them do illegal things.' },
            { id: 'intimidation', title: 'Using Intimidation', content: 'Making them scared by using looks, actions, or gestures, smashing things, destroying their property, abusing pets, or showing weapons.' },
            { id: 'emotional', title: 'Using Emotional Abuse', content: 'Putting them down, making them feel bad about themselves, calling them names, making them think they\'re crazy, playing mind games, humiliating them, or making them feel guilty.' },
            { id: 'isolation', title: 'Using Isolation', content: 'Controlling what they do, who they see and talks to, what they read, or where they go, limiting their involvement with others, or using jealousy to excuse these actions.' },
            { id: 'minimize', title: 'Minimising Denying & Blaming', content: 'Making light of the abuse and not taking their worries seriously, saying the abuse didn\'t happen, shifting responsibility for abusive behaviour, or saying they caused it.' },
            { id: 'children', title: 'Using Children', content: 'Making them feel guilty about the children, using the children to pass on messages, using visitation to harass them, or threatening to take the children away.' },
            { id: 'privilege', title: 'Using Male Privilege', content: 'Treating them like a servant, making all the big decisions, acting like the master of the house, or defining what gender roles should be.' },
            { id: 'economic', title: 'Using Economic Abuse', content: 'Stopping them from getting or keeping a job, making them ask for money, giving them an allowance, taking their money, or not letting them know about or access family income.' }
        ];

        const introData = { title: 'POWER AND CONTROL', content: 'Select the outer circles to reveal information.' };
        const container = document.querySelector('.learning-activity-container');
        let activeCircleId = null;

        function render() {
            const isMobile = window.innerWidth <= 768;
            const centerX = container.offsetWidth / 2;
            const centerY = container.offsetHeight / 2;
            const activeIndex = sectionsData.findIndex(s => s.id === activeCircleId);

            sectionsData.forEach((section, index) => {
                const el = document.getElementById(`circle-${section.id}`);
                const isActive = section.id === activeCircleId;
                let x, y, size;

                if (!isMobile) {
                    // --- PC: ORIGINAL MATH ---
                    size = isActive ? 120 : 100;
                    let targetAngleDegrees;
                    if (index <= activeIndex) {
                        targetAngleDegrees = 135 + (index * 30);
                    } else {
                        const relIdx = (activeIndex === -1) ? index : index - (activeIndex + 1);
                        targetAngleDegrees = 45 - (relIdx * 30);
                    }
                    const rad = targetAngleDegrees * (Math.PI / 180);
                    const orbitRadius = 300;
                    x = centerX + orbitRadius * Math.cos(rad) - (size / 2);
                    y = centerY - orbitRadius * Math.sin(rad) - (size / 2);
                    el.style.transform = `translate(${x}px, ${y}px)`;
                } else {
                    // --- MOBILE: STRAIGHT LINES TOP (1-4) & BOTTOM (5-8) ---
                    size = window.innerWidth * 0.15;
                    const gap = window.innerWidth * 0.22;
                    const startX = (window.innerWidth - (gap * 3)) / 2;
                    const vDist = window.innerWidth * 0.60; // Distance from center circle

                    if (index < 4) {
                        x = startX + (index * gap) - (size / 2);
                        y = centerY - vDist - (size / 2);
                    } else {
                        x = startX + ((index - 4) * gap) - (size / 2);
                        y = centerY + vDist - (size / 2);
                    }
                    el.style.transform = `translate(${x}px, ${y}px)`;
                }

                el.style.width = `${size}px`;
                el.style.height = `${size}px`;
                el.classList.toggle('active', isActive);
            });
        }

        function handleClick(id) {
            if (activeCircleId === id) {
                activeCircleId = null;
                document.getElementById('large-circle-title').textContent = introData.title;
                document.getElementById('large-circle-text').textContent = introData.content;
            } else {
                activeCircleId = id;
                const data = sectionsData.find(s => s.id === id);
                document.getElementById('large-circle-title').textContent = (sectionsData.indexOf(data) + 1) + ". " + data.title.toUpperCase();
                document.getElementById('large-circle-text').textContent = data.content;
            }
            render();
        }

        function init() {
            sectionsData.forEach((section, index) => {
                const div = document.createElement('div');
                div.className = 'small-circle';
                div.id = `circle-${section.id}`;
                div.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full w-full">
                        <span class="circle-number font-bold">${index + 1}</span>
                        <div class="circle-title text-[10px] leading-tight mt-1 px-1">${section.title.replace(/ /g, '<br>')}</div>
                    </div>
                `;
                div.onclick = () => handleClick(section.id);
                document.getElementById('small-circles-wrapper').appendChild(div);
            });
            document.getElementById('large-circle-title').textContent = introData.title;
            document.getElementById('large-circle-text').textContent = introData.content;
            render();
            window.addEventListener('resize', render);
        }

        init();
    </script>
</body>
</html>
