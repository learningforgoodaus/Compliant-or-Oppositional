<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliant or Oppositional Drag & Drop Activity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F2F2F2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 1rem;
        }

        /* --- DESKTOP SPECIFIC STYLES --- */
        .container {
            width: 100%;
            max-width: 800px;
            height: 720px;
            padding: 1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background-color: #FFF;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .instruction-box {
            min-height: 120px; 
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #C6B4D9;
            background-color: #F2F2F2;
            margin-bottom: 12px;
        }

        .draggable-item {
            cursor: grab;
            padding: 0.5rem 1rem;
            margin: 0.25rem;
            background-color: #C6B4D9;
            color: #413659;
            border-radius: 6px;
            font-weight: 600;
            text-align: center;
            width: fit-content;
            max-width: 100%;
            transition: transform 0.1s, opacity 0.1s, background-color 0.2s;
            touch-action: none;
        }

        .drop-target {
            background-color: #413659;
            color: #F2F2F2;
            padding: 0.75rem;
            border-radius: 8px;
            margin: 0.5rem;
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 120px;
            transition: background-color 0.2s, border 0.2s;
            border: 3px solid transparent;
        }
        
        .drop-target-title {
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
            color: #C6B4D9;
        }

        .drag-over { border: 3px dashed #C6B4D9; background-color: #513873; }
        .correct { background-color: #a7f3d0 !important; border: 2px solid #059669 !important; pointer-events: none; }
        .incorrect { background-color: #fecaca !important; border: 2px solid #ef4444 !important; }

        /* --- MOBILE SWIPE STYLES --- */
        #mobile-swipe-zone {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
            height: 400px;
            margin-top: 20px;
        }

        .swipe-card {
            position: absolute;
            width: 80%;
            max-width: 300px;
            height: 200px;
            background: #C6B4D9;
            color: #413659;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            touch-action: none;
            user-select: none;
            transition: transform 0.3s ease, background-color 0.3s;
        }

        .swipe-instructions {
            display: none;
            width: 100%;
            justify-content: space-between;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #513873;
        }

        @media (max-width: 768px) {
            #drop-targets, #drag-pool, #check-button { display: none !important; }
            #mobile-swipe-zone, .swipe-instructions { display: flex !important; }
            .container { height: auto; min-height: 600px; }
            body { align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="text-xl font-bold text-[#513873] text-center mb-2">Compliant or Oppositional Responses</h2>
        
        <p class="text-left text-sm text-[#413659] instruction-box">
            <strong>Mobile:</strong> Swipe <b>Left</b> for Oppositional, <b>Right</b> for Compliant.<br>
            <strong>Desktop:</strong> Drag and drop the signs into the correct category.
        </p>

        <div id="drop-targets" class="flex justify-center gap-4 mb-3">
            <div id="target-Compliant" class="drop-target w-1/2" data-category="Compliant">
                <div class="drop-target-title">Compliant</div>
            </div>
            <div id="target-Oppositional" class="drop-target w-1/2" data-category="Oppositional">
                <div class="drop-target-title">Oppositional</div>
            </div>
        </div>

        <div id="drag-pool" class="flex flex-wrap justify-center p-2 bg-[#F2F2F2] rounded-lg mb-4 h-[180px]"></div>

        <div class="swipe-instructions">
            <span class="text-red-700">← Oppositional</span>
            <span class="text-green-700">Compliant →</span>
        </div>
        <div id="mobile-swipe-zone">
            </div>

        <div class="text-center mt-2">
            <button id="check-button" class="px-6 py-2 bg-[#513873] text-white font-semibold rounded-lg hover:bg-[#413659]">
                Check Answers
            </button>
            <div id="feedback" class="mt-2 font-semibold text-lg"></div>
        </div>
    </div>

    <script>
        const data = [
            { text: "Overly eager to please", category: "Compliant" },
            { text: "Quickly leaves when partner texts", category: "Compliant" },
            { text: "Gives in to demands easily", category: "Compliant" },
            { text: "Moody or short-tempered", category: "Oppositional" },
            { text: "Seems difficult or negative with others", category: "Oppositional" }, 
            { text: "Avoids eye contact or withdraws", category: "Oppositional" },
        ];

        const dragPool = document.getElementById('drag-pool');
        const dropTargets = document.getElementById('drop-targets');
        const mobileZone = document.getElementById('mobile-swipe-zone');
        const feedbackDiv = document.getElementById('feedback');
        const checkButton = document.getElementById('check-button');

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // --- MOBILE SWIPE LOGIC ---
        let currentCard = null;
        let startX = 0;

        function createSwipeCards() {
            mobileZone.innerHTML = '';
            shuffle([...data]).forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'swipe-card';
                card.textContent = item.text;
                card.dataset.category = item.category;
                card.style.zIndex = data.length - index;
                
                card.addEventListener('touchstart', touchStart);
                card.addEventListener('touchmove', touchMove);
                card.addEventListener('touchend', touchEnd);
                
                mobileZone.appendChild(card);
            });
        }

        function touchStart(e) {
            startX = e.touches[0].clientX;
            currentCard = e.currentTarget;
            currentCard.style.transition = 'none';
        }

        function touchMove(e) {
            if (!currentCard) return;
            const currentX = e.touches[0].clientX;
            const diff = currentX - startX;
            const rotation = diff / 10;
            
            // Visual feedback as user drags
            let bgColor = '#C6B4D9';
            if (diff > 50) bgColor = '#a7f3d0'; // Green-ish
            if (diff < -50) bgColor = '#fecaca'; // Red-ish
            
            currentCard.style.background = bgColor;
            currentCard.style.transform = `translateX(${diff}px) rotate(${rotation}deg)`;
        }

        function touchEnd(e) {
            if (!currentCard) return;
            const diff = e.changedTouches[0].clientX - startX;
            const threshold = 100;
            const category = currentCard.dataset.category;

            // Logic: Swipe Right = Compliant, Swipe Left = Oppositional
            const swipedRight = diff > threshold;
            const swipedLeft = diff < -threshold;

            const isCorrect = (swipedRight && category === "Compliant") || (swipedLeft && category === "Oppositional");
            const isWrongDir = (swipedRight && category === "Oppositional") || (swipedLeft && category === "Compliant");

            if (isCorrect) {
                // Success - Fly away
                currentCard.style.transition = 'transform 0.5s ease-out';
                currentCard.style.transform = `translateX(${diff > 0 ? 1000 : -1000}px) rotate(${diff / 5}deg)`;
                setTimeout(() => {
                    currentCard.remove();
                    if (mobileZone.children.length === 0) {
                        feedbackDiv.innerHTML = `<span class="text-green-600">All signs correctly identified!</span>`;
                    }
                }, 300);
            } else {
                // Incorrect or partial swipe - Snap back
                currentCard.style.transition = 'transform 0.3s ease, background-color 0.3s';
                currentCard.style.transform = 'translateX(0) rotate(0)';
                currentCard.style.background = isWrongDir ? '#ef4444' : '#C6B4D9'; // Flash red if wrong side
                setTimeout(() => currentCard.style.background = '#C6B4D9', 500);
            }
            currentCard = null;
        }

        // --- DESKTOP LOGIC (MAINTAINED) ---
        function initDesktop() {
            dragPool.innerHTML = '';
            shuffle([...data]).forEach(itemData => {
                const item = document.createElement('div');
                item.className = 'draggable-item shadow-md';
                item.textContent = itemData.text;
                item.draggable = true;
                item.dataset.category = itemData.category;
                item.id = 'item-' + Math.random().toString(36).substring(2, 9);
                item.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', e.target.id);
                    e.target.classList.add('opacity-50');
                });
                dragPool.appendChild(item);
            });

            Array.from(dropTargets.children).forEach(target => {
                target.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    target.classList.add('drag-over');
                });
                target.addEventListener('dragleave', () => target.classList.remove('drag-over'));
                target.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const itemId = e.dataTransfer.getData('text/plain');
                    const draggable = document.getElementById(itemId);
                    target.classList.remove('drag-over');
                    target.appendChild(draggable);
                    draggable.classList.remove('opacity-50');
                });
            });
        }

        checkButton.addEventListener('click', () => {
            let correctCount = 0;
            const items = document.querySelectorAll('.draggable-item');
            items.forEach(item => {
                const target = item.parentElement;
                if (target.dataset.category === item.dataset.category) {
                    item.classList.add('correct');
                    correctCount++;
                } else {
                    item.classList.add('incorrect');
                    setTimeout(() => {
                        item.classList.remove('incorrect');
                        dragPool.appendChild(item);
                    }, 1000);
                }
            });
            if (correctCount === data.length) {
                feedbackDiv.innerHTML = `<span class="text-green-600">Well done! All correct.</span>`;
            }
        });

        // Init both
        document.addEventListener('DOMContentLoaded', () => {
            initDesktop();
            createSwipeCards();
        });
    </script>
</body>
</html>
